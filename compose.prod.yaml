services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    working_dir: /srv
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@database:3306/${MYSQL_DATABASE}?serverVersion=8.0&charset=utf8mb4"
      JWT_SECRET_KEY: /srv/config/jwt/private.pem
      JWT_PUBLIC_KEY: /srv/config/jwt/public.pem
    volumes:
      - ./config/jwt:/srv/config/jwt:ro
      - app_var:/srv/var
      - app_media:/srv/public/media
    depends_on:
      database:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/caddy/Dockerfile.web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "127.0.0.1:8089:80"
    volumes:
      - app_media:/srv/public/media:ro

  database:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - database_data:/var/lib/mysql:rw

volumes:
  database_data:
  app_var:
  app_media:
