services:
  app:
    environment:
      APP_ENV: dev
      APP_DEBUG: 1

  database:
    ports:
      - "3306:3306"

###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025"
      - "8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
