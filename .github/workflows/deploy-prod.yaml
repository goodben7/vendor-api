name: Deploy (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -z "${{ secrets.VPS_HOST }}" ] || [ -z "${{ secrets.VPS_SSH_USER }}" ] || [ -z "${{ secrets.VPS_SSH_PRIVATE_KEY }}" ] || [ -z "${{ secrets.VPS_DEPLOY_PATH }}" ]; then
            echo "Missing required secrets. Check VPS_HOST, VPS_SSH_USER, VPS_SSH_PRIVATE_KEY, VPS_DEPLOY_PATH."
            exit 1
          fi

          if [ -z "${{ secrets.VPS_SSH_PORT }}" ]; then
            echo "Missing VPS_SSH_PORT secret (usually 22)."
            exit 1
          fi

          printf '%s\n' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -T 10 -p "${{ secrets.VPS_SSH_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        shell: bash
        env:
          SSH_HOST: ${{ secrets.VPS_HOST }}
          SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          SSH_USER: ${{ secrets.VPS_SSH_USER }}
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          GIT_REF: ${{ github.ref_name }}
        run: |
          ssh -i ~/.ssh/id_rsa -o BatchMode=yes -o StrictHostKeyChecking=yes -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "set -e
            cd \"$DEPLOY_PATH\"
            git fetch --all --prune
            git checkout \"$GIT_REF\"
            git reset --hard \"origin/$GIT_REF\"
            docker compose --env-file .env.prod -f compose.prod.yaml pull --ignore-pull-failures || true
            docker compose --env-file .env.prod -f compose.prod.yaml up -d --build
            docker compose --env-file .env.prod -f compose.prod.yaml exec -T -u 0 app sh -lc 'chown -R www-data:www-data /srv/var && chmod -R u+rwX,g+rwX /srv/var'
            docker compose --env-file .env.prod -f compose.prod.yaml exec -T -u www-data app php bin/console doctrine:migrations:migrate -n
            docker compose --env-file .env.prod -f compose.prod.yaml exec -T -u www-data app php bin/console cache:clear --env=prod
          "
